<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste Vibração</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>

<button onclick="vibrar()">Vibrar</button>

<script>
function vibrar() {
    if (navigator.vibrate) {
        navigator.vibrate(2000);
        alert("Comando enviado");
    } else {
        alert("Vibration API não suportada");
    }
}
</script>

</body>
</html>

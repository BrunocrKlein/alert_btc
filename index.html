<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Alerta BTC Bybit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    button {
      font-size: 20px;
      padding: 15px;
      margin-top: 20px;
    }

    .valor {
      font-size: 24px;
      margin: 15px;
    }
  </style>
</head>
<body>

  <h2>Alerta BTCUSDT.P Bybit</h2>

  <div class="valor">Preço: <span id="preco">--</span></div>
  <div class="valor">Média 300 High: <span id="media">--</span></div>
  <div class="valor">Status: <span id="status">Parado</span></div>

  <button onclick="iniciar()">Iniciar alerta</button>
  <button onclick="parar()">Parar</button>

  <script>
    navigator.wakeLock.request('screen');
    let ativo = false;
    let alertou = false;
    let intervaloConsulta = null;
    let intervaloVibracaoPeriodica = null;

    const INTERVALO = "3"; // timeframe da Bybit: 3 minutos
    const SYMBOL = "BTCUSDT";
    const LIMITE = 300;

    // ALTERE AQUI O TEMPO DA VIBRAÇÃO AUTOMÁTICA
    const VIBRACAO_PERIODICA_MINUTOS = 5;

    async function buscarDados() {
      try {
        const url = `https://api.bybit.com/v5/market/kline?category=linear&symbol=${SYMBOL}&interval=${INTERVALO}&limit=${LIMITE}`;

        const resposta = await fetch(url);
        const json = await resposta.json();

        const candles = json.result.list;

        const highs = candles.map(c => parseFloat(c[2]));
        const closes = candles.map(c => parseFloat(c[4]));

        const mediaHigh300 = highs.reduce((a, b) => a + b, 0) / highs.length;
        const precoAtual = closes[0];

        document.getElementById("preco").innerText = precoAtual.toFixed(2);
        document.getElementById("media").innerText = mediaHigh300.toFixed(2);

        verificarToque(precoAtual, mediaHigh300);

      } catch (erro) {
        document.getElementById("status").innerText = "Erro ao buscar dados";
        console.error(erro);
      }
    }

    function verificarToque(preco, media) {
      const tolerancia = media * 0.0005; // 0,05%

      const tocou = Math.abs(preco - media) <= tolerancia;

      if (tocou && !alertou) {
        document.getElementById("status").innerText = "TOCOU NA MÉDIA!";
        vibrar();
        alertou = true;
      }

      if (!tocou) {
        document.getElementById("status").innerText = "Monitorando...";
        alertou = false;
      }
    }

    function vibrar() {
      if ("vibrate" in navigator) {
        navigator.vibrate([1000, 500, 1000, 500, 1000]);
      } else {
        alert("Preço tocou na média!");
      }
    }

    function iniciar() {
      if (ativo) return;

      ativo = true;
      document.getElementById("status").innerText = "Monitorando...";

      buscarDados();

      intervaloConsulta = setInterval(() => {
        if (ativo) {
          buscarDados();
        }
      }, 10000);

      intervaloVibracaoPeriodica = setInterval(() => {
        if (ativo) {
          vibrar();
        }
      }, VIBRACAO_PERIODICA_MINUTOS * 60 * 1000);
    }

    function parar() {
      ativo = false;

      clearInterval(intervaloConsulta);
      clearInterval(intervaloVibracaoPeriodica);

      intervaloConsulta = null;
      intervaloVibracaoPeriodica = null;

      navigator.vibrate(0);

      document.getElementById("status").innerText = "Parado";
    }
  </script>

</body>
</html>
